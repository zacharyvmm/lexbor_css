name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/tests.yml

  publish:
    name: Publish to crates.io
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
